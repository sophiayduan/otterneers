                 id="fullscreen-btn">
                <svg id="fs-enter" width="30" height="30" viewBox="0 0 40 40" fill="none"
                     xmlns="http://www.w3.org/2000/svg">
                    <path d="M29 2H38V11" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"
                          stroke-linejoin="round"/>
                    <path d="M38 29V38H29" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"
                          stroke-linejoin="round"/>
                    <path d="M11 38H2V29" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"
                          stroke-linejoin="round"/>
                    <path d="M2 11V2H11" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"
                          stroke-linejoin="round"/>
                </svg>
                <svg id="fs-exit" width="30" height="30" viewBox="0 0 40 40" fill="none"
                     xmlns="http://www.w3.org/2000/svg" class="hidden">
                    <path d="M38 11H29V2" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"
                          stroke-linejoin="round"/>
                    <path d="M29 39V30H38" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"
                          stroke-linejoin="round"/>
                    <path d="M2 30H11V39" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"
                          stroke-linejoin="round"/>
                    <path d="M11 2V11H2" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"
                          stroke-linejoin="round"/>
                </svg>
            </div>
            <script>
                document.addEventListener('fullscreenchange', () => {
                    const full = !!document.fullscreenElement;
                    document.getElementById('fs-enter').classList.toggle('hidden', full);
                    document.getElementById('fs-exit').classList.toggle('hidden', !full);
                });
            </script>


            <script>
                (function () {
                    const label = document.getElementById('cursor-label');
                    const seq = document.getElementById('sequence-container');
                    let mx = 0, my = 0, cx = 0, cy = 0, visible = false, done = false;

                    window.addEventListener('scroll', () => {
                        if (!done && window.scrollY > seq.offsetHeight * 0.85) {
                            done = true;
                            visible = false;
                            label.style.opacity = '0';
                        }
                    }, {passive: true});

                    document.addEventListener('mousemove', e => {
                        if (done) return;
                        mx = e.clientX;
                        my = e.clientY;
                        const r = seq.getBoundingClientRect();
                        const inside = e.clientX >= r.left && e.clientX <= r.right &&
                            e.clientY >= r.top && e.clientY <= r.bottom;
                        if (inside !== visible) {
                            visible = inside;
                            label.style.opacity = inside ? '1' : '0';
                        }
                    });

                    (function loop() {
                        requestAnimationFrame(loop);
                        cx += (mx + 18 - cx) * 0.1;
                        cy += (my - 28 - cy) * 0.1;
                        label.style.transform = `translate(${cx}px,${cy}px)`;
                    })();
                })();
            </script>

            <a href="" class="text-beige w-fit h-fit font-medium pointer-events-auto"
               onclick="event.preventDefault(); const c = document.getElementById('credits'); c.classList.toggle('hidden'); document.body.classList.toggle('overflow-hidden', !c.classList.contains('hidden')); this.textContent = c.classList.contains('hidden') ? 'CREDITS' : 'CLOSE';">CREDITS</a>
        </div>
