<script>
(function () {
  const hero   = document.getElementById('hero-section');
  const canvas = document.getElementById('hero-particles');

  const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: false });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));

  const scene = new THREE.Scene();
  const group = new THREE.Group();
  scene.add(group);

  const camera = new THREE.PerspectiveCamera(60, 1, 0.1, 100);
  camera.position.z = 4;

  function makeSprite(drawFn) {
    const c = document.createElement('canvas');
    c.width = c.height = 64;
    const ctx = c.getContext('2d');
    ctx.fillStyle = '#FFFDF6';
    drawFn(ctx);
    return new THREE.CanvasTexture(c);
  }

  const sprites = [
    makeSprite(ctx => {
      const g = ctx.createRadialGradient(32,32,0,32,32,28);
      g.addColorStop(0, 'rgba(255,253,246,1)');
      g.addColorStop(0.4, 'rgba(255,253,246,0.6)');
      g.addColorStop(1, 'rgba(255,253,246,0)');
      ctx.fillStyle = g; ctx.beginPath(); ctx.arc(32,32,28,0,Math.PI*2); ctx.fill();
    }),
    makeSprite(ctx => {
      const g = ctx.createRadialGradient(32,32,0,32,32,22);
      g.addColorStop(0, 'rgba(255,253,246,0.9)');
      g.addColorStop(0.5, 'rgba(255,253,246,0.5)');
      g.addColorStop(1, 'rgba(255,253,246,0)');
      ctx.fillStyle = g; ctx.beginPath(); ctx.arc(32,32,22,0,Math.PI*2); ctx.fill();
    }),
  ];

  const COUNT = 200, RANGE = 10, ZMIN = -9, ZMAX = -2;
  const positions  = new Float32Array(COUNT * 3);
  const velocities = new Float32Array(COUNT * 3);

  for (let i = 0; i < COUNT; i++) {
    positions[i*3]   = (Math.random()-0.5) * RANGE;
    positions[i*3+1] = (Math.random()-0.5) * RANGE;
    positions[i*3+2] = Math.random() * (ZMAX - ZMIN) + ZMIN;
    velocities[i*3]   = (Math.random()-0.5) * 0.004;
    velocities[i*3+1] = (Math.random()-0.5) * 0.004;
    velocities[i*3+2] = (Math.random()-0.5) * 0.001;
  }

  const perShape = Math.floor(COUNT / sprites.length);
  const pointsObjects = sprites.map((sprite, si) => {
    const start = si * perShape;
    const end   = si === sprites.length - 1 ? COUNT : start + perShape;
    const n = end - start;
    const buf = new Float32Array(n * 3);
    for (let i = 0; i < n; i++) {
      buf[i*3]   = positions[(start+i)*3];
      buf[i*3+1] = positions[(start+i)*3+1];
      buf[i*3+2] = positions[(start+i)*3+2];
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(buf, 3));
    const mat = new THREE.PointsMaterial({
      size: 0.032, map: sprite, color: 0xFFFDF6,
      transparent: true, opacity: 0.7,
      sizeAttenuation: true, depthWrite: false,
    });
    const pts = new THREE.Points(geo, mat);
    group.add(pts);
    return { pts, start, end };
  });

  const mouse  = { x: 0, y: 0 };
  const target = { x: 0, y: 0 };
  window.addEventListener('mousemove', e => {
    const rect = hero.getBoundingClientRect();
    if (e.clientY > rect.bottom) return;
    mouse.x =  ((e.clientX - rect.left) / rect.width  - 0.5) * 2;
    mouse.y = -((e.clientY - rect.top)  / rect.height - 0.5) * 2;
  });

  function resize() {
    const w = hero.offsetWidth, h = hero.offsetHeight;
    renderer.setSize(w, h, false);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  }
  window.addEventListener('resize', resize);
  resize();

  (function animate() {
    requestAnimationFrame(animate);
    const half = RANGE / 2;
    for (let i = 0; i < COUNT; i++) {
      positions[i*3]   += velocities[i*3];
      positions[i*3+1] += velocities[i*3+1];
      positions[i*3+2] += velocities[i*3+2];
      if (positions[i*3]   >  half) positions[i*3]   = -half;
      if (positions[i*3]   < -half) positions[i*3]   =  half;
      if (positions[i*3+1] >  half) positions[i*3+1] = -half;
      if (positions[i*3+1] < -half) positions[i*3+1] =  half;
      if (positions[i*3+2] > ZMAX)  positions[i*3+2] = ZMIN;
      if (positions[i*3+2] < ZMIN)  positions[i*3+2] = ZMAX;
    }
    for (const { pts, start, end } of pointsObjects) {
      const attr = pts.geometry.attributes.position;
      const n = end - start;
      for (let i = 0; i < n; i++) {
        attr.array[i*3]   = positions[(start+i)*3];
        attr.array[i*3+1] = positions[(start+i)*3+1];
        attr.array[i*3+2] = positions[(start+i)*3+2];
      }
      attr.needsUpdate = true;
    }
    target.x += (mouse.x - target.x) * 0.04;
    target.y += (mouse.y - target.y) * 0.04;
    group.rotation.y = target.x * 0.1;
    group.rotation.x = target.y * 0.06;
    renderer.render(scene, camera);
  })();
})();
</script>

<script>
(function () {
  const frameCount = 47;
  const canvas = document.getElementById('frame-canvas');
  const ctx = canvas.getContext('2d');

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  const frames = Array.from({ length: frameCount }, (_, i) => {
    const img = new Image();
    img.src = `public/sequence/Untitled_Artwork-${i + 1}.png`;
    return img;
  });

  function drawFrame(index) {
    const img = frames[index];
    if (!img.complete) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const scale = Math.max(canvas.width / img.naturalWidth, canvas.height / img.naturalHeight);
    const w = img.naturalWidth * scale;
    const h = img.naturalHeight * scale;
    const x = (canvas.width - w) / 2;
    const y = (canvas.height - h) / 2;
    ctx.drawImage(img, x, y, w, h);
  }

  frames[0].onload = () => drawFrame(0);

  gsap.registerPlugin(ScrollTrigger);

  const state = { frame: 0 };

  const scrollConfig = {
    trigger: '#sequence-container',
    start: 'top top',
    end: 'bottom bottom',
    scrub: 0.2,
  };

  gsap.to(state, {
    frame: frameCount - 1,
    ease: 'none',
    scrollTrigger: scrollConfig,
    onUpdate() {
      drawFrame(Math.round(state.frame));
    },
  });

  const tl = gsap.timeline({ scrollTrigger: scrollConfig });

  tl.fromTo(canvas,
    { scale: 0.4, x: '25vw' },
    { scale: 1,   x: '-25vw', ease: 'power2.inOut', duration: 0.3 }
  )
  .to(canvas,
    { x: 0, ease: 'power2.out', duration: 0.5 }
  );
})();
</script>

<script>
(function () {
  const star = document.getElementById('hero-star');

  // Each segment: rotate by some degrees at a given duration, with a scale pulse
  let spinner = gsap.to(star, {
    rotation: 360,
    duration: 2.5,
    ease: 'none',
    repeat: -1,
    paused: true,
    transformOrigin: '50% 50%',
  });

  let scaler = gsap.to(star, {
    scale: 1.12,
    duration: 1.6,
    ease: 'sine.inOut',
    yoyo: true,
    repeat: -1,
    paused: true,
    transformOrigin: '50% 50%',
  });

  star.addEventListener('mouseenter', () => { spinner.play(); scaler.play(); });
  star.addEventListener('mouseleave', () => { spinner.pause(); scaler.pause(); });
})();
</script>

<script>
(function () {
  const canvas = document.getElementById('hero-title');

  const svgImg = new Image();
  svgImg.onload = function () {
    const W = svgImg.naturalWidth;
    const H = svgImg.naturalHeight;
    const PAD = 300; // padding so edge distortion isn't clipped
    const PW = W + PAD * 2;
    const PH = H + PAD * 2;

    // Pull canvas back by PAD so it stays visually aligned
    canvas.style.margin = `-${PAD}px`;

    const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: false });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setSize(PW, PH);

    const scene = new THREE.Scene();
    const camera = new THREE.OrthographicCamera(-PW/2, PW/2, PH/2, -PH/2, -1, 1);

    const texture = new THREE.Texture(svgImg);
    texture.needsUpdate = true;

    // UV offsets so texture is mapped only to the central W×H area of the PW×PH plane
    const uPadU  = PAD / PW;
    const uPadV  = PAD / PH;
    const uScaleU = W / PW;
    const uScaleV = H / PH;

    const mat = new THREE.ShaderMaterial({
      transparent: true,
      uniforms: {
        uTex:    { value: texture },
        uMouse:  { value: new THREE.Vector2(0.5, 0.5) },
        uHover:  { value: 0.0 },
        uTime:   { value: 0.0 },
        uPadUV:  { value: new THREE.Vector2(uPadU, uPadV) },
        uScaleUV:{ value: new THREE.Vector2(uScaleU, uScaleV) },
      },
      vertexShader: `
        varying vec2 vUv;
        void main() {
          vUv = uv;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        precision highp float;
        uniform sampler2D uTex;
        uniform vec2 uMouse;
        uniform float uHover;
        uniform float uTime;
        uniform vec2 uPadUV;
        uniform vec2 uScaleUV;
        varying vec2 vUv;

        void main() {
          // Remap from full-plane UV space to texture (content) UV space
          vec2 uv = (vUv - uPadUV) / uScaleUV;

          vec2 toMouse = uMouse - uv;
          float dist = length(toMouse);
          vec2 dir = normalize(toMouse + 0.0001);

          // Elastic wave distortion
          float wave = sin(dist * 14.0 - uTime * 4.0) * exp(-dist * 6.0);
          uv += dir * wave * uHover * 0.18;

          // Custom-colour chromatic split
          float split = uHover * 0.04 * smoothstep(0.4, 0.0, dist);
          float t     = uHover * smoothstep(0.4, 0.0, dist);

          vec3 col1 = vec3(0.102, 0.910, 0.898); // #1AE8E5
          vec3 col3 = vec3(0.686, 0.592, 0.729); // #AF97BA

          vec2 uv1 = uv + dir * split;
          vec2 uv2 = uv;
          vec2 uv3 = uv - dir * split;

          // Zero out samples that fall outside [0,1] — prevents edge-clamp streaks
          float m1 = step(0.0,uv1.x)*step(uv1.x,1.0)*step(0.0,uv1.y)*step(uv1.y,1.0);
          float m2 = step(0.0,uv2.x)*step(uv2.x,1.0)*step(0.0,uv2.y)*step(uv2.y,1.0);
          float m3 = step(0.0,uv3.x)*step(uv3.x,1.0)*step(0.0,uv3.y)*step(uv3.y,1.0);

          float a1 = texture2D(uTex, uv1).a * m1;
          float a2 = texture2D(uTex, uv2).a * m2;
          float a3 = texture2D(uTex, uv3).a * m3;

          vec4 base    = texture2D(uTex, uv2);
          base.a      *= m2;
          vec3 mainCol = vec3(0.098, 0.200, 0.702); // #1933B3

          vec3 splitCol = mainCol * a2
                        + col1 * max(a1 - a2, 0.0)
                        + col3 * max(a3 - a2, 0.0);
          float splitA  = max(a1, max(a2, a3));

          gl_FragColor = vec4(mix(mainCol, splitCol, t), mix(base.a, splitA, t));
        }
      `,
    });

    // Plane covers the full padded canvas — distorted pixels render in the padding area
    const mesh = new THREE.Mesh(new THREE.PlaneGeometry(PW, PH), mat);
    scene.add(mesh);

    const mouse  = new THREE.Vector2(0.5, 0.5);
    const lerped = new THREE.Vector2(0.5, 0.5);
    let hoverTarget = 0;
    let lastMoveTime = 0;
    const IDLE_MS = 150; // fade out after this many ms without movement

    document.addEventListener('mousemove', e => {
      const r = canvas.getBoundingClientRect();
      const inside = e.clientX >= r.left + PAD && e.clientX <= r.right  - PAD &&
                     e.clientY >= r.top  + PAD && e.clientY <= r.bottom - PAD;
      if (inside) {
        hoverTarget = 1;
        lastMoveTime = performance.now();
        mouse.set(
          (e.clientX - r.left - PAD) / W,
          1 - (e.clientY - r.top - PAD) / H
        );
      } else {
        hoverTarget = 0;
      }
    });

    (function animate(t) {
      requestAnimationFrame(animate);
      // Fade out if mouse has stopped moving
      if (hoverTarget === 1 && performance.now() - lastMoveTime > IDLE_MS) {
        hoverTarget = 0;
      }
      lerped.lerp(mouse, 0.07);
      mat.uniforms.uMouse.value.copy(lerped);
      mat.uniforms.uHover.value += (hoverTarget - mat.uniforms.uHover.value) * 0.018;
      mat.uniforms.uTime.value = t * 0.001;
      renderer.render(scene, camera);
    })(0);
  };
  svgImg.src = 'public/seaotters.svg';
})();
</script>
