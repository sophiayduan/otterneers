<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sea Otters</title>
  <link href="src/styles/styles.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
</head>
<body class="relative" style="overflow-x:clip;">

  <div id="sequence-container" style="height:600vh; position:relative; overflow:visible;">
    <canvas id="frame-canvas" class="opacity-60" style="position: sticky; top: 0; width: 100%; height: 100vh; display: block; mix-blend-mode: soft-light;"></canvas>
  </div>
  <!-- margin top controls where we are in the animation -->
  <section id="hero-section" class="relative w-screen h-full flex flex-col items-start" style="margin-top:-550vh;"> 
    
    <div id="hero" class="relative w-screen min-h-fit text-center flex flex-col text-left p-10">
     
      <div class="relative w-fit">
        
        <canvas id="hero-title" class="relative" style="display:block;"></canvas>
        <!-- <svg id="hero-star" class="absolute top-0 right-0 cursor-pointer" width="88" height="118" viewBox="0 0 88 118" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M44 24.6396C44 39.7246 44.0002 47.2678 48.6865 51.9541C53.3728 56.6401 60.9154 56.6396 76 56.6396H88V59H76C60.9151 59 53.3728 59.0002 48.6865 63.6865C44.0002 68.3728 44 75.9151 44 91V118H42.2402V91C42.2402 75.9152 42.2399 68.3728 37.5537 63.6865C32.8674 59.0003 25.325 59 10.2402 59H0L0 56.6396H10.2402C25.3248 56.6396 32.8674 56.6402 37.5537 51.9541C42.24 47.2678 42.2402 39.7246 42.2402 24.6396V0L44 0V24.6396Z" fill="#FFEBAD"/>
        </svg> -->
      </div>
      <h3 class="tracking-[4%] font-semibold text-4xl relative pt-10">Protecting Otters, Preserving Nature.</h3>
      <!-- <p class="mt-8 text-sm tracking-widest uppercase opacity-60 relative">Scroll to Discover</p> -->
    </div>
    <div id="rock-scene" class="grid grid-cols-1 grid-rows-1 relative w-full min-h-[90vh] -mt-10">
   
      <div class="col-start-1 row-start-1">
        <img style="" class="-translate-x-1/4 w-screen object-contain select-none pointer-events-none" src="rocks/dark.png" alt="">
        <img style="mix-blend-mode:multiply;" class="absolute bottom-40 -right-1/6 w-[50%] select-none pointer-events-none" src="rocks/medium-moss.png" alt="">

        <img style="mix-blend-mode:multiply;"  class="absolute bottom-40 right-1/5 w-100 select-none pointer-events-none" src="rocks/2.png" alt="">
    

        <!-- <img " class="absolute bottom-1/2 left-50 w-90 select-none pointer-events-none" src="rocks/3.png" alt=""> -->
          <div class="w-full absolute bottom-0" style="height: 50%; background: linear-gradient(to bottom, transparent 0%, #040B11 50%)">
        </div>
      </div>

    </div>
    <canvas id="light-rays"    style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:0;"></canvas>
    <canvas id="hero-particles" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:1;"></canvas>
  </section>
  <section class="bg-[#040B11] w-full h-200 flex items-start justify-start p-10">
    <span class="text-beige text-5xl max-w-6xl">Lorem, ipsum dolor sit amet consectetur adipisicing elit. Ullam dolores, necessitatibus rerum sequi consequuntur similique laudantium, consectetur culpa quidem unde! </span>
  </section>

  <section id="credits" class="hidden fixed top-0 left-0 bg-[#18171A]/70 w-screen h-screen flex flex-col items-center justify-center text-beige">
    <span class="text-4xl font-extrabold py-4 " style="font-family: Heavitas">CREDITS</span>
    <span class="tracking-[4%] text-xl">The Otterneers -  Naomi, Zoey, Sia, Sophia</span>
    <span class="tracking-[4%] text-xl">&copy;  2026</span>
  </section>
 

<script type="module" src="src/scripts/light-rays.js"></script>
<script type="module" src="src/scripts/particles.js"></script>
<script type="module" src="src/scripts/title-shader.js"></script>
<script type="module" src="src/scripts/script.js"></script>
<script type="module" src="src/scripts/cursor.js"></script>

  <div class="fixed inset-0 p-6 pt-10 flex flex-col pointer-events-none">
    <div class="mb-auto ml-auto w-10 h-10 cursor-pointer pointer-events-auto flex items-center justify-center"
         onclick="document.fullscreenElement ? document.exitFullscreen() : document.documentElement.requestFullscreen()"
         id="fullscreen-btn">
      <svg id="fs-enter" width="30" height="30" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M29 2H38V11" stroke="#314AC4" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M38 29V38H29" stroke="#314AC4" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M11 38H2V29" stroke="#314AC4" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M2 11V2H11" stroke="#314AC4" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <svg id="fs-exit" width="30" height="30" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" class="hidden">
        <path d="M38 11H29V2" stroke="#314AC4" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M29 39V30H38" stroke="#314AC4" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M2 30H11V39" stroke="#314AC4" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M11 2V11H2" stroke="#314AC4" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <script>
      document.addEventListener('fullscreenchange', () => {
        const full = !!document.fullscreenElement;
        document.getElementById('fs-enter').classList.toggle('hidden', full);
        document.getElementById('fs-exit').classList.toggle('hidden', !full);
      });
    </script>
    <div class="mt-auto flex w-full justify-between items-end">
      <div class="">
        <span class="text-beige">3/7</span>
        <ul class="flex gap-x-[6px] w-fit my-1">
          <li class="w-4 h-full aspect-square rounded-full bg-beige"></li>
          <li class="w-4 h-full aspect-square rounded-full bg-beige"></li>
          <li class="w-4 h-full aspect-square rounded-full bg-beige"></li>
          <li class="w-4 h-full aspect-square rounded-full bg-beige"></li>
          <li class="w-4 h-full aspect-square rounded-full bg-beige"></li>
          <li class="w-4 h-full aspect-square rounded-full bg-beige"></li>
          <li class="w-4 h-full aspect-square rounded-full bg-beige"></li>
          <li class="w-4 h-full aspect-square rounded-full bg-beige"></li>
        </ul>
      </div>
      <a href="" class="text-beige w-fit h-fit font-medium pointer-events-auto" onclick="event.preventDefault(); const c = document.getElementById('credits'); c.classList.toggle('hidden'); document.body.classList.toggle('overflow-hidden', !c.classList.contains('hidden'))">CREDITS</a>

    </div>
  </div>
</body>
</html>
