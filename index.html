<html>
<head>

    <title>Sea Otters</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <h1 id="site-heading">Protecting Otters, Preserving Nature.</h1>

    <p>International Otter Day is the last Wednesday of May. This year, it is May 27th</p>

    <p>A group of sea otters is called a raft.</p>

    <p></p>

    <section class="contact-us">
        <h2>Contact Us</h2>
        <form>
            <input type="text" name="name" id="contact-us-name" placeholder="Name"/>
            <input type="email" name="email" id="contact-us-email" placeholder="name@email.com"/>
            <textarea name="message" id="contact-us-message" placeholder="Message"></textarea>
            <button type="submit">Submit</button>
        </form>
      
    </section>

    <div class="rocks-container">
        <div class="rocks-left">
            <img src="./images/large-moss-rock-left.PNG">
        </div>
        <div class="rocks-middle">
            <img src="./images/medium-moss-rock-middle.PNG">
        </div>
        <div class="rocks-right">
        </div>
    </div>

    <script src="easter-eggs.js" defer></script>
    <script src="script.js" defer></script>
