<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sea Otters</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>
<div class="fixed h-screen w-screen z-100 p-4 flex flex-col">
    <div class="ml-auto text-right space-y-1">
        <ul class="flex gap-x-[6px]" id="easter-egg-dots">
            <li class="w-4 h-full aspect-square rounded-full bg-white border border-blue"></li>
            <li class="w-4 h-full aspect-square rounded-full bg-white border border-blue"></li>
            <li class="w-4 h-full aspect-square rounded-full bg-white border border-blue"></li>
            <li class="w-4 h-full aspect-square rounded-full bg-white border border-blue"></li>
            <li class="w-4 h-full aspect-square rounded-full bg-white border border-blue"></li>
            <li class="w-4 h-full aspect-square rounded-full bg-white border border-blue"></li>
        </ul>
        <!-- Amount found out of total vv -->
        <span id="easter-eggs-counter">0/6</span>
    </div>
</div>
<h1 id="site-heading">Protecting Otters, Preserving Nature.</h1>

<p>International Otter Day is the last Wednesday of May. This year, it is May 27th</p>

<p>A group of sea otters is called a raft.</p>

<p></p>

<section class="contact-us">
    <h2>Contact Us</h2>
    <form>
        <input type="text" name="name" id="contact-us-name" placeholder="Name"/>
        <input type="email" name="email" id="contact-us-email" placeholder="name@email.com"/>
        <textarea name="message" id="contact-us-message" placeholder="Message"></textarea>
        <button type="submit">Submit</button>
    </form>

</section>

<div class="rocks-container">
    <div class="rocks-left">
        <img src="./images/large-moss-rock-left.PNG">
    </div>
    <div class="rocks-middle">
        <img src="./images/medium-moss-rock-middle.PNG">
    </div>
    <div class="rocks-right">
    </div>
</div>

<script src="easter-eggs.js" defer></script>
<script src="script.js" defer></script>
</body>

<footer>
    <h3>Credits</h3>
    <p>Developers: Sophia, Sia, Naomi, Zoey</p>
    <p>Mascots: Lutri Lutri (Lulu) and Bria</p>
</footer>
</html>
